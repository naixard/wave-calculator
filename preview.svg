    <line x1="857"  y1="540" x2="857"  y2="547" stroke="#8b90a8" stroke-width="1"/>
    <text x="857"  y="562">1.5</text>
    <line x1="956"  y1="540" x2="956"  y2="547" stroke="#8b90a8" stroke-width="1"/>
    <text x="956"  y="562">2.0</text>
    <line x1="1056" y1="540" x2="1056" y2="547" stroke="#8b90a8" stroke-width="1"/>
    <text x="1056" y="562">2.5</text>
    <line x1="1155" y1="540" x2="1155" y2="547" stroke="#8b90a8" stroke-width="1"/>
