  <g fill="#8b90a8" font-family="system-ui,-apple-system,sans-serif" font-size="13" text-anchor="end">
    <line x1="560" y1="463" x2="553" y2="463" stroke="#8b90a8" stroke-width="1"/>
    <text x="548" y="468">2</text>
    <line x1="560" y1="387" x2="553" y2="387" stroke="#8b90a8" stroke-width="1"/>
    <text x="548" y="392">4</text>
    <line x1="560" y1="310" x2="553" y2="310" stroke="#8b90a8" stroke-width="1"/>
    <text x="548" y="315">6</text>
    <line x1="560" y1="233" x2="553" y2="233" stroke="#8b90a8" stroke-width="1"/>
    <text x="548" y="238">8</text>
    <line x1="560" y1="157" x2="553" y2="157" stroke="#8b90a8" stroke-width="1"/>
    <text x="548" y="162">10</text>
