    <line x1="720" y1="80" x2="720" y2="540" stroke="#34d399"/>
    <line x1="751" y1="80" x2="751" y2="540" stroke="#f472b6"/>
  </g>

  <!-- Modified PM fill -->
  <path clip-path="url(#cc)" fill="url(#pg)"
    d="M 560 540 L 639 538 L 649 532 L 659 519 L 669 498 L 679 463 L 689 414 L 700 348 L 709 291 L 719 272 L 723 275 L 729 279 L 739 302 L 749 337 L 758 371 L 778 425 L 797 463 L 836 506 L 875 524 L 953 536 L 1155 540 Z"/>

  <!-- JONSWAP fill -->
  <path clip-path="url(#cc)" fill="url(#jg)"
