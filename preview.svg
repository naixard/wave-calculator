  <!-- Period labels above chart -->
  <text x="689" y="73" fill="#f59e0b"
        font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">T&#x2080;</text>
  <text x="720" y="73" fill="#34d399"
        font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">T&#x2081;</text>
  <text x="751" y="73" fill="#f472b6"
        font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">T&#x2082;</text>

  <!-- ── LEFT PANEL ── -->

  <!-- Title -->
  <text x="55" y="195"
        fill="#e2e4f0" font-family="system-ui,-apple-system,sans-serif"
