    d="M 560 540 L 619 540 L 639 538 L 649 529 L 659 506 L 669 444 L 675 368 L 681 253 L 687 138 L 689 118 L 692 138 L 696 195 L 700 253 L 705 329 L 711 379 L 719 425 L 729 463 L 739 486 L 749 502 L 758 511 L 778 523 L 797 529 L 836 535 L 875 538 L 953 539 L 1155 540"/>

