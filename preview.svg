<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="jg" x1="0" y1="80" x2="0" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="pg" x1="0" y1="80" x2="0" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.02"/>
    </linearGradient>
    <clipPath id="cc">
      <rect x="560" y="80" width="595" height="461"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="630" fill="#0d0f16"/>

  <!-- Chart panel background -->
  <rect x="490" y="50" width="695" height="555" fill="#161822" rx="12"/>

  <!-- Horizontal grid lines -->
  <g stroke="#2d3148" stroke-width="1">
    <line x1="560" y1="463" x2="1155" y2="463"/>
    <line x1="560" y1="387" x2="1155" y2="387"/>
    <line x1="560" y1="310" x2="1155" y2="310"/>
    <line x1="560" y1="233" x2="1155" y2="233"/>
    <line x1="560" y1="157" x2="1155" y2="157"/>
  </g>

