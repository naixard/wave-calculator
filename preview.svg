    <line x1="758" y1="80" x2="758" y2="540"/>
    <line x1="857" y1="80" x2="857" y2="540"/>
    <line x1="956" y1="80" x2="956" y2="540"/>
    <line x1="1056" y1="80" x2="1056" y2="540"/>
  </g>

