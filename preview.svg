  <text x="55" y="255"
        fill="#e2e4f0" font-family="system-ui,-apple-system,sans-serif"
        font-size="50" font-weight="700" letter-spacing="-1.5">Calculator</text>

  <!-- Description -->
  <text x="55" y="300"
        fill="#8b90a8" font-family="system-ui,-apple-system,sans-serif" font-size="15">Interactive ocean wave energy spectra</text>
  <text x="55" y="322"
        fill="#8b90a8" font-family="system-ui,-apple-system,sans-serif" font-size="15">plotter for naval &amp; offshore engineering</text>

  <!-- Spectrum legend -->
  <rect x="55" y="364" width="26" height="3" rx="1.5" fill="#4f8ef7"/>
  <text x="91" y="370"
        fill="#e2e4f0" font-family="system-ui,-apple-system,sans-serif" font-size="14">JONSWAP</text>
  <rect x="55" y="393" width="26" height="3" rx="1.5" fill="#06b6d4"/>
  <text x="91" y="399"
        fill="#e2e4f0" font-family="system-ui,-apple-system,sans-serif" font-size="14">Modified Pierson-Moskowitz</text>

  <!-- Period legend -->
  <rect x="55" y="430" width="8" height="16" rx="1" fill="#f59e0b"/>
  <text x="73" y="442"
        fill="#8b90a8" font-family="system-ui,-apple-system,sans-serif" font-size="13">T&#x2080;  Peak period</text>
  <rect x="55" y="454" width="8" height="16" rx="1" fill="#34d399"/>
  <text x="73" y="466"
        fill="#8b90a8" font-family="system-ui,-apple-system,sans-serif" font-size="13">T&#x2081;  Mean period</text>
  <rect x="55" y="478" width="8" height="16" rx="1" fill="#f472b6"/>
  <text x="73" y="490"
        fill="#8b90a8" font-family="system-ui,-apple-system,sans-serif" font-size="13">T&#x2082;  Zero-crossing period</text>

  <!-- URL -->
  <text x="55" y="578"
        fill="#4f8ef7" font-family="system-ui,-apple-system,sans-serif"
