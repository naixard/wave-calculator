    d="M 560 540 L 639 538 L 649 532 L 659 519 L 669 498 L 679 463 L 689 414 L 700 348 L 709 291 L 719 272 L 723 275 L 729 279 L 739 302 L 749 337 L 758 371 L 778 425 L 797 463 L 836 506 L 875 524 L 953 536 L 1155 540"/>

  <!-- JONSWAP curve -->
  <path clip-path="url(#cc)" fill="none" stroke="#4f8ef7" stroke-width="2.5"
